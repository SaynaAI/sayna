[workspace]
changelog_update = true
git_tag_enable = true
git_release_enable = false  # cargo-dist handles GitHub releases
publish = false             # skip crates.io publishing

[changelog]
header = """# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/SaynaAI/sayna/commit/{{ commit.id }}))
{%- endfor %}
{% endfor %}
"""
